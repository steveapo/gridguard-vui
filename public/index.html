<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg:#0d0d0d;--surface:#1a1a1a;--surface-hi:#222;--border:#2c2c2c;--border-hi:#3a3a3a;
      --text:#f0f0f0;--text-mid:#a0a0a0;--text-dim:#5a5a5a;
      --ok:#4ade80;--warn:#fb923c;--err:#f87171;--blue:#60a5fa;
      --user-text:#c0c0c0;--agent-text:#f0f0f0;--hint-border:#2c2c2c;--hint-text:#888;
      --topbar-bg:#111;--input-border:#3a3a3a;--input-text:#f0f0f0;--input-ph:#555;
      --btn-bg:#1a1a1a;--btn-border:#3a3a3a;--btn-text:#c0c0c0;--mic-idle:#f0f0f0;
    }
    [data-theme="white"] {
      --bg:#fff;--surface:#f5f5f5;--surface-hi:#eee;--border:#ddd;--border-hi:#ccc;
      --text:#111;--text-mid:#444;--text-dim:#999;
      --ok:#16a34a;--warn:#ea580c;--err:#dc2626;--blue:#2563eb;
      --user-text:#555;--agent-text:#111;--hint-border:#e0e0e0;--hint-text:#666;
      --topbar-bg:#fafafa;--input-border:#ccc;--input-text:#111;--input-ph:#aaa;
      --btn-bg:#f0f0f0;--btn-border:#ccc;--btn-text:#444;--mic-idle:#111;
    }
    [data-theme="soft"] {
      --bg:#1a1f2e;--surface:#222840;--surface-hi:#2a3150;--border:#2e3a58;--border-hi:#3a4870;
      --text:#e8edf8;--text-mid:#8fa0c0;--text-dim:#4a5878;
      --ok:#5eead4;--warn:#fbbf24;--err:#f87171;--blue:#818cf8;
      --user-text:#a0b0d0;--agent-text:#e8edf8;--hint-border:#2e3a58;--hint-text:#6a80a8;
      --topbar-bg:#151a28;--input-border:#3a4870;--input-text:#e8edf8;--input-ph:#4a5878;
      --btn-bg:#222840;--btn-border:#3a4870;--btn-text:#8fa0c0;--mic-idle:#e8edf8;
    }

    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow:hidden;transition:background .3s,color .3s}
    .app{display:grid;grid-template-rows:clamp(52px,6vh,64px) 1fr 1px clamp(100px,14vh,130px);height:100vh}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,3vw,40px);background:var(--topbar-bg);border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
    .wordmark{font-family:'DM Mono',monospace;font-size:clamp(13px,1.2vw,17px);font-weight:500;letter-spacing:.22em;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:clamp(12px,2vw,28px)}
    .theme-switcher{display:flex;gap:4px}
    .theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .2s,transform .2s}
    .theme-btn:hover{transform:scale(1.15)}
    .theme-btn.active{border-color:var(--text)}
    .theme-btn[data-t="dark"]{background:#0d0d0d;box-shadow:inset 0 0 0 1px #3a3a3a}
    .theme-btn[data-t="white"]{background:#fff;box-shadow:inset 0 0 0 1px #ccc}
    .theme-btn[data-t="soft"]{background:#1a1f2e;box-shadow:inset 0 0 0 1px #3a4870}
    .meta-item{font-family:'DM Mono',monospace;font-size:clamp(10px,.9vw,13px);color:var(--text-mid);letter-spacing:.08em;display:flex;align-items:center;gap:6px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:breathe 2.4s ease-in-out infinite}

    .conversation{overflow-y:auto;padding:clamp(32px,5vh,64px) 0 clamp(16px,2vh,32px);scroll-behavior:smooth}
    .conversation::-webkit-scrollbar{width:4px}
    .conversation::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .inner{max-width:min(680px,88vw);margin:0 auto;padding:0 clamp(20px,3vw,40px)}

    .turn{margin-bottom:clamp(24px,3.5vh,40px);opacity:0;transform:translateY(10px);animation:fadeUp .35s ease forwards}
    .turn-label{font-family:'DM Mono',monospace;font-size:clamp(9px,.75vw,11px);letter-spacing:.22em;margin-bottom:clamp(6px,.8vh,10px);font-weight:400}
    .turn.user .turn-label{color:var(--blue)}
    .turn.agent .turn-label{color:var(--ok)}
    .turn.user .turn-text{font-size:clamp(15px,1.5vw,19px);color:var(--user-text);line-height:1.7;font-weight:300}
    .turn.agent .turn-text{font-size:clamp(17px,1.7vw,22px);color:var(--agent-text);line-height:1.7;font-weight:400}

    .typing-indicator{display:none;align-items:center;gap:5px;height:28px}
    .typing-indicator.visible{display:flex}
    .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:typingDot 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}

    .empty-state{padding-top:clamp(20px,4vh,48px)}
    .empty-title{font-family:'DM Mono',monospace;font-size:clamp(10px,.9vw,13px);letter-spacing:.22em;color:var(--text-dim);margin-bottom:clamp(16px,2.5vh,28px)}
    .hint{font-size:clamp(14px,1.35vw,18px);font-weight:300;color:var(--hint-text);padding:clamp(10px,1.4vh,16px) 0;border-bottom:1px solid var(--hint-border);cursor:pointer;transition:color .15s,padding-left .2s;display:flex;align-items:center;gap:12px}
    .hint:hover{color:var(--text);padding-left:6px}
    .hint-arrow{font-family:'DM Mono',monospace;font-size:clamp(10px,.85vw,12px);color:var(--text-dim);flex-shrink:0}

    .divider{background:var(--border)}

    .bottombar{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,1.2vh,14px);padding:0 clamp(20px,3vw,40px);background:var(--bg);transition:background .3s}
    .voice-row{display:flex;align-items:center;gap:clamp(12px,1.8vw,22px);width:100%;max-width:min(680px,88vw)}

    .mic-wrap{position:relative;width:clamp(44px,4.5vw,56px);height:clamp(44px,4.5vw,56px);flex-shrink:0}
    .mic-pulse{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid var(--ok);opacity:0;pointer-events:none}
    .mic-wrap.listening .mic-pulse{animation:pulseSlow 1.8s ease-out infinite}
    .mic-wrap.barge     .mic-pulse{border-color:var(--warn);animation:pulseSlow 1.4s ease-out infinite}
    .mic-wrap.speaking  .mic-pulse{border-color:var(--blue);animation:pulseSlow 1.2s ease-out infinite}

    .mic-btn{width:100%;height:100%;border-radius:50%;border:1.5px solid var(--border-hi);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s,box-shadow .2s;position:relative;z-index:1;outline:none}
    .mic-btn:hover{border-color:var(--text-mid);box-shadow:0 0 0 3px rgba(128,128,128,.08)}
    .mic-btn.listening {border-color:var(--ok);  background:rgba(74,222,128,.08); box-shadow:0 0 0 3px rgba(74,222,128,.08)}
    .mic-btn.barge     {border-color:var(--warn); background:rgba(251,146,60,.06); box-shadow:0 0 0 3px rgba(251,146,60,.06)}
    .mic-btn.speaking  {border-color:var(--blue); background:rgba(96,165,250,.08); box-shadow:0 0 0 3px rgba(96,165,250,.08)}
    .mic-btn.processing{border-color:var(--warn); background:rgba(251,146,60,.08)}
    .mic-btn svg{width:clamp(18px,1.8vw,24px);height:clamp(18px,1.8vw,24px);color:var(--mic-idle);transition:color .2s}
    .mic-btn.listening  svg{color:var(--ok)}
    .mic-btn.barge      svg{color:var(--warn)}
    .mic-btn.speaking   svg{color:var(--blue)}
    .mic-btn.processing svg{color:var(--warn)}

    .waveform{display:flex;align-items:center;gap:3px;height:clamp(20px,2.5vh,28px);opacity:0;transition:opacity .25s;flex-shrink:0}
    .waveform.active{opacity:1}
    .wb{width:3px;border-radius:2px;background:var(--ok);animation:waveAnim .9s ease-in-out infinite}
    .waveform.barge-wf    .wb{background:var(--warn);animation-duration:.7s}
    .waveform.speaking-wf .wb{background:var(--blue);animation-duration:.6s}
    .wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}
    .wb:nth-child(4){animation-delay:.3s}.wb:nth-child(5){animation-delay:.2s}.wb:nth-child(6){animation-delay:.1s}.wb:nth-child(7){animation-delay:0s}

    .status-label{font-family:'DM Mono',monospace;font-size:clamp(11px,1vw,14px);letter-spacing:.1em;color:var(--text-dim);flex:1;transition:color .2s}
    .status-label.listening {color:var(--ok)}
    .status-label.barge     {color:var(--warn)}
    .status-label.speaking  {color:var(--blue)}
    .status-label.processing{color:var(--warn)}

    .barge-hint{font-family:'DM Mono',monospace;font-size:clamp(9px,.8vw,11px);color:var(--text-dim);letter-spacing:.1em;opacity:0;transition:opacity .3s;white-space:nowrap}
    .barge-hint.visible{opacity:1}

    .stop-btn{background:var(--btn-bg);border:1.5px solid var(--btn-border);color:var(--btn-text);font-family:'DM Mono',monospace;font-size:clamp(9px,.8vw,11px);letter-spacing:.12em;padding:clamp(4px,.5vh,6px) clamp(10px,1vw,14px);border-radius:3px;cursor:pointer;transition:border-color .2s,color .2s;display:none;white-space:nowrap;flex-shrink:0}
    .stop-btn.visible{display:inline-block}
    .stop-btn:hover{border-color:var(--err);color:var(--err)}

    .input-row{display:flex;width:100%;max-width:min(680px,88vw);gap:10px;align-items:center}
    .txt-input{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--input-border);padding:clamp(6px,.8vh,10px) 0;color:var(--input-text);font-family:'DM Sans',sans-serif;font-size:clamp(13px,1.2vw,16px);font-weight:300;outline:none;transition:border-color .2s}
    .txt-input::placeholder{color:var(--input-ph)}
    .txt-input:focus{border-bottom-color:var(--text-mid)}
    .txt-send{background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'DM Mono',monospace;font-size:clamp(10px,.85vw,12px);letter-spacing:.12em;padding:4px 6px;transition:color .2s;outline:none;flex-shrink:0}
    .txt-send:hover{color:var(--text)}

    @keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    @keyframes typingDot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
    @keyframes pulseSlow{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.6);opacity:0}}
    @keyframes waveAnim{0%,100%{height:3px}50%{height:clamp(12px,1.5vh,20px)}}
  </style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="wordmark">GRIDGUARD</div>
    <div class="topbar-right">
      <div class="theme-switcher">
        <button class="theme-btn active" data-t="dark"  onclick="setTheme('dark')"  title="Dark"></button>
        <button class="theme-btn"        data-t="white" onclick="setTheme('white')" title="White"></button>
        <button class="theme-btn"        data-t="soft"  onclick="setTheme('soft')"  title="Soft"></button>
      </div>
      <div class="meta-item"><div class="live-dot"></div><span>LIVE</span></div>
      <div class="meta-item" id="clock">--:--:--</div>
    </div>
  </header>

  <main class="conversation" id="conversation">
    <div class="inner">
      <div class="empty-state" id="empty-state">
        <div class="empty-title">READY FOR INPUT</div>
        <div class="hint" onclick="sendQuery('What outages are active right now?')"><span class="hint-arrow">→</span>What outages are active right now?</div>
        <div class="hint" onclick="sendQuery('Check Transformer T-12')"><span class="hint-arrow">→</span>Check Transformer T-12</div>
        <div class="hint" onclick="sendQuery('Read me the evacuation procedure')"><span class="hint-arrow">→</span>Read me the evacuation procedure</div>
        <div class="hint" onclick="sendQuery('Who is the current shift supervisor?')"><span class="hint-arrow">→</span>Who is the current shift supervisor?</div>
        <div class="hint" onclick="sendQuery('What can you do?')"><span class="hint-arrow">→</span>What can you do?</div>
      </div>
      <div class="typing-indicator" id="typing">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>
  </main>

  <div class="divider"></div>

  <footer class="bottombar">
    <div class="voice-row">
      <div class="mic-wrap" id="mic-wrap">
        <div class="mic-pulse"></div>
        <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8"  y1="22" x2="16" y2="22"/>
          </svg>
        </button>
      </div>
      <div class="waveform" id="waveform">
        <div class="wb" style="height:3px"></div><div class="wb" style="height:6px"></div>
        <div class="wb" style="height:10px"></div><div class="wb" style="height:14px"></div>
        <div class="wb" style="height:10px"></div><div class="wb" style="height:6px"></div>
        <div class="wb" style="height:3px"></div>
      </div>
      <div class="status-label" id="status-label">Press mic or type to begin</div>
      <div class="barge-hint" id="barge-hint">say "stop" or "repeat" to interrupt</div>
      <!-- STOP BUTTON: kills audio + mic -->
      <button class="stop-btn" id="stop-btn" onclick="stopAndKillMic()">■ STOP</button>
    </div>
    <div class="input-row">
      <input class="txt-input" id="txt-input" placeholder="Type a query..." onkeydown="if(event.key==='Enter')sendText()"/>
      <button class="txt-send" onclick="sendText()">SEND</button>
    </div>
  </footer>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let micActive     = false;
let phase         = 'idle';
let mainRec       = null;         // normal operator input
let bargeRec      = null;         // keyword-only during speaking
let mainRunning   = false;
let bargeRunning  = false;
let speechSupported = false;
let sessionId     = 'web-' + Date.now();
let lastAgentText = '';
let silenceTimer  = null;
let interimText   = '';
let pendingQuery  = false;
let currentAudio  = null;
let cooldownUntil = 0;
let bargeHandling = false;        // prevents duplicate barge-in triggers

const STOP_WORDS   = ['stop','halt','quiet','silence','enough'];
const REPEAT_WORDS = ['repeat','repeat that','say that again','again','what did you say'];
const COOLDOWN_MS  = 600;

// ─── THEME ────────────────────────────────────────────────────────────────────
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  localStorage.setItem('gg-theme',t);
}
(()=>setTheme(localStorage.getItem('gg-theme')||'dark'))();

// ─── CLOCK ────────────────────────────────────────────────────────────────────
setInterval(()=>document.getElementById('clock').textContent=new Date().toUTCString().slice(17,25)+' UTC',1000);
document.getElementById('clock').textContent=new Date().toUTCString().slice(17,25)+' UTC';

// ─── SPEECH RECOGNITION ───────────────────────────────────────────────────────
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setLabel('idle','Voice unavailable — use text input'); return; }
  speechSupported=true;

  // ── MAIN RECOGNITION — operator queries ──────────────────────────────────
  mainRec=new SR();
  mainRec.continuous=true;
  mainRec.interimResults=true;
  mainRec.lang='en-US';
  mainRec.maxAlternatives=1;
  mainRec.onstart=()=>{ mainRunning=true; };

  mainRec.onresult=(e)=>{
    if(!micActive||phase==='speaking') return;
    if(Date.now()<cooldownUntil) return;

    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript.trim();
      if(e.results[i].isFinal) final+=t; else interim+=t;
    }
    interimText=interim;

    if(final){
      clearTimeout(silenceTimer); interimText='';
      if(!pendingQuery){ pendingQuery=true; sendQuery(final); }
    } else if(interim.length>3){
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(()=>{
        if(interimText&&phase==='listening'&&!pendingQuery&&Date.now()>=cooldownUntil){
          const t=interimText; interimText='';
          pendingQuery=true; sendQuery(t);
        }
      },2000);
    }
  };

  mainRec.onerror=(e)=>{
    mainRunning=false;
    if(e.error==='aborted'||e.error==='no-speech'){ safeStartMain(); return; }
    console.warn('mainRec:',e.error);
  };

  mainRec.onend=()=>{
    mainRunning=false;
    if(micActive&&phase!=='speaking') safeStartMain();
  };

  // ── BARGE-IN RECOGNITION — keyword only, runs during speaking ────────────
  bargeRec=new SR();
  bargeRec.continuous=true;
  bargeRec.interimResults=true;
  bargeRec.lang='en-US';
  bargeRec.maxAlternatives=1;
  bargeRec.onstart=()=>{ bargeRunning=true; };

  bargeRec.onresult=(e)=>{
    if(phase!=='speaking') return;
    if(bargeHandling) return;       // already handling a barge-in, ignore duplicates

    let combined='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      combined+=e.results[i][0].transcript.toLowerCase()+' ';
    }

    // STOP voice command — stops audio, keeps mic alive
    if(STOP_WORDS.some(w=>combined.includes(w))){
      bargeHandling=true;
      stopAgent(false);             // keeps micActive unchanged
      return;
    }

    // REPEAT voice command — stops current audio then replays
    if(REPEAT_WORDS.some(w=>combined.includes(w))){
      bargeHandling=true;
      stopAgent(true);              // stops then replays lastAgentText
      return;
    }

    // All other speech silently discarded — never sent to agent
  };

  bargeRec.onerror=(e)=>{
    bargeRunning=false;
    if(e.error==='aborted') return;
    if(phase==='speaking'&&micActive) safeStartBarge();
  };

  bargeRec.onend=()=>{
    bargeRunning=false;
    if(phase==='speaking'&&micActive) safeStartBarge();
  };
}

function safeStartMain(){
  if(!speechSupported||!micActive||mainRunning||phase==='speaking') return;
  setTimeout(()=>{ if(!micActive||mainRunning||phase==='speaking') return; try{ mainRec.start(); }catch(e){} },120);
}

function safeStartBarge(){
  if(!speechSupported||!micActive||bargeRunning) return;
  setTimeout(()=>{ if(!micActive||bargeRunning) return; try{ bargeRec.start(); }catch(e){} },120);
}

function safeStopMain(){ if(!mainRunning) return; try{ mainRec.stop(); }catch(e){} }
function safeStopBarge(){ if(!bargeRunning) return; try{ bargeRec.stop(); }catch(e){} }

// ─── MIC BUTTON ───────────────────────────────────────────────────────────────
function handleMicClick(){
  if(!speechSupported){ document.getElementById('txt-input').focus(); return; }
  if(phase==='speaking'){ stopAndKillMic(); return; }

  if(!micActive){
    micActive=true;
    safeStartMain();
    setPhase('listening');
  } else {
    micActive=false;
    safeStopMain();
    safeStopBarge();
    setPhase('idle');
  }
}

// ─── STOP BUTTON — kills audio AND mic completely ─────────────────────────────
function stopAndKillMic(){
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window.speechSynthesis&&window.speechSynthesis.cancel();
  safeStopBarge();
  safeStopMain();
  micActive=false;
  bargeHandling=false;
  cooldownUntil=Date.now()+COOLDOWN_MS;
  setPhase('idle');
}

// ─── STOP AGENT — stops audio, optionally replays, mic stays as-is ───────────
function stopAgent(thenRepeat){
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window.speechSynthesis&&window.speechSynthesis.cancel();
  safeStopBarge();
  cooldownUntil=Date.now()+COOLDOWN_MS;

  if(thenRepeat&&lastAgentText){
    // Small gap ensures previous audio fully cancelled before new one starts
    setTimeout(()=>{ bargeHandling=false; speak(lastAgentText); },350);
  } else {
    bargeHandling=false;
    if(micActive){ setPhase('listening'); safeStartMain(); }
    else setPhase('idle');
  }
}

// ─── TTS — Azure Neural with Web Speech fallback ──────────────────────────────
async function speak(text){
  // Reset barge guard for this new response
  bargeHandling=false;

  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window.speechSynthesis&&window.speechSynthesis.cancel();

  safeStopMain();
  setPhase('speaking');
  if(micActive) safeStartBarge();

  try{
    const res=await fetch('/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });

    if(res.headers.get('content-type')?.includes('application/json')){
      const data=await res.json();
      if(data.fallback) return speakWebSpeech(text);
    }

    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    currentAudio=new Audio(url);
    currentAudio.onended=()=>{ URL.revokeObjectURL(url); currentAudio=null; onAgentFinished(); };
    currentAudio.onerror=()=>{ currentAudio=null; onAgentFinished(); };
    await currentAudio.play();

  } catch(e){
    console.warn('TTS failed, fallback to Web Speech');
    speakWebSpeech(text);
  }
}

function speakWebSpeech(text){
  if(!window.speechSynthesis){ onAgentFinished(); return; }
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.name.includes('Google UK English Male'))||
           voices.find(v=>v.name.includes('Microsoft David'))||
           voices.find(v=>v.name==='Daniel'&&v.lang==='en-GB')||
           voices.find(v=>v.lang==='en-GB')||
           voices.find(v=>v.lang==='en-US')||voices[0];
  if(v) utt.voice=v;
  utt.rate=1.05; utt.pitch=0.90; utt.volume=1;
  utt.onend=()=>onAgentFinished();
  utt.onerror=()=>onAgentFinished();
  window.speechSynthesis.speak(utt);
}

function onAgentFinished(){
  safeStopBarge();
  currentAudio=null;
  bargeHandling=false;
  cooldownUntil=Date.now()+COOLDOWN_MS;
  if(micActive){ setPhase('listening'); safeStartMain(); }
  else setPhase('idle');
}

// ─── QUERY ────────────────────────────────────────────────────────────────────
async function sendQuery(text){
  if(!text.trim()){ pendingQuery=false; return; }
  clearTimeout(silenceTimer);
  safeStopMain();
  safeStopBarge();
  setPhase('processing');
  removeEmpty();
  addTurn('user',text);
  showTyping(true);

  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,sessionId})
    });
    const data=await res.json();
    const response=data.response||data.error||'No response received.';
    showTyping(false);
    lastAgentText=response;
    addTurn('agent',response);
    speak(response);
  } catch(e){
    showTyping(false);
    const err='Connection error. Check server status.';
    addTurn('agent',err);
    lastAgentText=err;
    speak(err);
  } finally{
    pendingQuery=false;
  }
}

function sendText(){
  const inp=document.getElementById('txt-input');
  const t=inp.value.trim(); if(!t) return;
  inp.value='';
  if(!pendingQuery){ pendingQuery=true; sendQuery(t); }
}

// ─── UI PHASE ─────────────────────────────────────────────────────────────────
function setPhase(p){
  phase=p;
  const micBtn   =document.getElementById('mic-btn');
  const micWrap  =document.getElementById('mic-wrap');
  const waveform =document.getElementById('waveform');
  const stopBtn  =document.getElementById('stop-btn');
  const bargeHint=document.getElementById('barge-hint');

  const visual=(p==='speaking'&&micActive)?'barge':p;

  micBtn.className  ='mic-btn '+visual;
  micWrap.className ='mic-wrap '+visual;
  waveform.className='waveform'+(visual==='listening'||visual==='barge'||visual==='speaking'?' active':'')+
                     (visual==='speaking'?' speaking-wf':visual==='barge'?' barge-wf':'');
  stopBtn.className   ='stop-btn'  +(p==='speaking'?' visible':'');
  bargeHint.className ='barge-hint'+(p==='speaking'&&micActive?' visible':'');

  const labels={
    idle:       'Press mic or type to begin',
    listening:  'Listening...',
    processing: 'Processing...',
    speaking:   micActive?'Speaking — say "stop" or "repeat" to interrupt':'Speaking...'
  };
  const sl=document.getElementById('status-label');
  sl.textContent=labels[p]||'Ready';
  sl.className='status-label '+(visual==='barge'?'barge':p);
}

function setLabel(p,t){
  const sl=document.getElementById('status-label');
  sl.textContent=t; sl.className='status-label '+p;
}

// ─── DOM ──────────────────────────────────────────────────────────────────────
function addTurn(role,text){
  const conv=document.getElementById('conversation');
  const inner=conv.querySelector('.inner');
  const typing=document.getElementById('typing');
  const turn=document.createElement('div');
  turn.className='turn '+role;
  turn.innerHTML=`<div class="turn-label">${role==='user'?'OPERATOR':'GRIDGUARD'}</div><div class="turn-text">${esc(text)}</div>`;
  inner.insertBefore(turn,typing);
  conv.scrollTop=conv.scrollHeight;
}

function showTyping(show){
  document.getElementById('typing').className='typing-indicator'+(show?' visible':'');
  if(show) document.getElementById('conversation').scrollTop=999999;
}

function removeEmpty(){
  const el=document.getElementById('empty-state'); if(el) el.remove();
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload=()=>{
  initSpeech();
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  }
};
</script>
